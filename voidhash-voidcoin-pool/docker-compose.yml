version: "3.7"

x-images:
  node: &node-image ghcr.io/voidhash-crypto/voidcoin-pool-node:${VERSION:-latest}
  api: &api-image ghcr.io/voidhash-crypto/voidcoin-pool-api:${VERSION:-latest}
  stratum: &stratum-image ghcr.io/voidhash-crypto/voidcoin-pool-stratum:${VERSION:-latest}
  web: &web-image ghcr.io/voidhash-crypto/voidcoin-pool-web:${VERSION:-latest}

services:
  # Routes Umbrel's reverse proxy + login screen to the web dashboard.
  # APP_HOST must match the "web" service's container_name below.
  app_proxy:
    environment:
      APP_HOST: void-web
      APP_PORT: 80

  node:
    image: *node-image
    container_name: void-node
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/node:/root/.voidcoin
    environment:
      - RPC_PASSWORD=${NODE_RPC_PASSWORD:-changeme}
    command:
      - -printtoconsole
      - -prune=1000
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=voidrpc
      - -rpcpassword=${NODE_RPC_PASSWORD:-changeme}
      - -zmqpubhashblock=tcp://0.0.0.0:28332
      - -zmqpubrawblock=tcp://0.0.0.0:28332
    expose:
      - "28332"
    healthcheck:
      test: ["CMD-SHELL", "voidcoin-cli -rpcuser=voidrpc -rpcpassword=$$RPC_PASSWORD getblockchaininfo || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: void-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: voidpool
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: voidpool
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
      - ${APP_DIR}/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voidpool -d voidpool"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: void-redis
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: *api-image
    container_name: void-api
    restart: unless-stopped
    depends_on:
      node:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=voidpool
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=voidpool
      - REDIS_URL=redis://redis:6379
      - RPC_HOST=node
      - RPC_PORT=7778
      - RPC_USER=voidrpc
      - RPC_PASSWORD=${NODE_RPC_PASSWORD:-changeme}
      - POOL_NAME=${POOL_NAME:-My Void Pool}
      - POOL_FEE=${POOL_FEE:-1.0}
      - SOLO_FEE=${SOLO_FEE:-0.5}
      - POOL_ADDRESS=${POOL_ADDRESS:-}
      - MIN_PAYOUT=${MIN_PAYOUT:-5}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/v1/stats || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  stratum:
    image: *stratum-image
    container_name: void-stratum
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # Miners speak raw stratum/TCP, not HTTP, so this bypasses Umbrel's
    # app_proxy and is published directly. Make sure to forward this port
    # on your router if you want miners connecting from outside your LAN.
    ports:
      - "${STRATUM_PORT:-3333}:3333"
    environment:
      - API_URL=http://api:8080
      - RPC_HOST=node
      - RPC_PORT=7778
      - RPC_USER=voidrpc
      - RPC_PASSWORD=${NODE_RPC_PASSWORD:-changeme}
      - POOL_ADDRESS=${POOL_ADDRESS:-}
      - POOL_FEE=${POOL_FEE:-1.0}
      - ZMQ_ENDPOINT=tcp://node:28332
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3333 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: *web-image
    container_name: void-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # No "ports:" here on purpose — app_proxy above routes Umbrel's
    # reverse proxy (and login screen) to this container on port 80.
    environment:
      - API_URL=http://api:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
